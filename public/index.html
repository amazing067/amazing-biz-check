<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>매니저 출석 체크</title>
  <style>
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif; margin: 0; padding: 3rem 1.5rem; min-height: 100vh;
      background: linear-gradient(180deg, #d4ebf7 0%, #e8f4e8 45%, #f0f7e8 100%);
      color: #2c3e50;
      display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      gap: 1.8rem;
    }
    .brand-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.3rem;
    }
    .brand-logo {
      max-width: 260px;
      max-height: 140px;
      object-fit: contain;
      display: block;
      filter: drop-shadow(0 0 14px rgba(15,23,42,0.7));
    }
    .brand-name {
      font-size: 1.8rem;
      font-weight: 900;
      letter-spacing: 0.14em;
      color: #0f172a;
      text-shadow: 0 0 10px rgba(255,255,255,0.7);
    }
    h1 {
      margin: 0 0 0.4rem;
      font-size: 2.4rem;
      color: #1a3a52;
      text-align: center;
      font-weight: 800;
    }
    .subtitle {
      margin: 0 0 1.8rem;
      font-size: 1.25rem;
      color: #334155;
      text-align: center;
      font-weight: 600;
    }
    a {
      display: block;
      padding: 1.4rem 2.4rem;
      margin-bottom: 1.1rem;
      min-width: 320px;
      max-width: 420px;
      background: rgba(255,255,255,0.95);
      color: #0f766e;
      text-decoration: none;
      border-radius: 18px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.14);
      border: 1px solid rgba(255,255,255,0.98);
      font-size: 1.35rem;
      font-weight: 800;
      text-align: center;
    }
    a:hover { background: #fff; box-shadow: 0 5px 18px rgba(0,0,0,0.12); }
  </style>
</head>
<body>
  <div class="brand-wrapper">
    <img src="/logos/amazinglogo.png" alt="어메이징 사업부 로고" class="brand-logo" onerror="this.style.display='none'">
    <div class="brand-name">어메이징 사업부</div>
  </div>
  <h1>매니저 출석 체크</h1>
  <p class="subtitle">TV 대시보드 · 출/퇴근 체크(태블릿)</p>
  <a href="/tv.html">📺 TV 대시보드 (메인 화면)</a>
  <a href="/checkin.html">✅ 출근 / 퇴근 체크 (태블릿)</a>
</body>
</html>
