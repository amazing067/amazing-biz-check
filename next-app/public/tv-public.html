<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV 대시보드 - 공용</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #e9eff2;
      color: #0f172a;
      height: 100vh;
    }

    .public-layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 42% 58%;
      gap: 0;
    }

    .kb-panel {
      padding: 1.0vh 1.0vw 1.0vh;
      background: #f7fafc;
      border-right: 2px solid rgba(15, 23, 42, 0.12);
      display: flex;
      flex-direction: column;
      gap: 0.9vh;
      min-height: 0;
    }

    .kb-box {
      flex: 1;
      min-height: 0;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.7);
      border: 2px solid rgba(124, 58, 237, 0.18);
      box-shadow: 0 10px 24px rgba(15,23,42,0.08);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .kb-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: transparent;
    }

    .notice {
      flex: 0 0 12vh;
      min-height: 0;
      border-radius: 14px;
      background: rgba(255,255,255,0.75);
      border: 2px solid rgba(255, 59, 212, 0.18);
      box-shadow: 0 10px 24px rgba(15,23,42,0.06);
      padding: 0.8vh 0.9vw;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      color: #111827;
      font-size: clamp(0.95rem, 1.8vh, 1.35rem);
    }

    .pdf-panel {
      padding: 1.0vh 1.0vw 1.0vh;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(110% 120% at 10% 10%, rgba(168, 85, 247, 0.30), transparent 50%),
        radial-gradient(90% 100% at 90% 20%, rgba(236, 72, 153, 0.16), transparent 55%),
        linear-gradient(160deg, #0b0720 0%, #1a0b45 40%, #2b0a57 72%, #160633 100%);
      color: #e9e7ff;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .pdf-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 14px 34px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pdf-wrap canvas {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: transparent;
    }

    .pdf-wrap #companyPdfCanvasBg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      background: transparent;
      filter: blur(18px) saturate(1.15) contrast(1.05);
      opacity: 0.35;
      transform: scale(1.06);
      transform-origin: center;
      pointer-events: none;
      z-index: 0;
    }

    .pdf-wrap #companyPdfCanvas {
      position: relative;
      z-index: 1;
      background: #fff;
    }

    .pdf-wrap .pdf-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.2vh 1.1vw;
      color: rgba(233,231,255,0.92);
      font-weight: 800;
      font-size: clamp(1rem, 2vh, 1.35rem);
      background: linear-gradient(180deg, rgba(15,23,42,0.55) 0%, rgba(15,23,42,0.25) 100%);
      backdrop-filter: blur(6px);
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="public-layout">
    <section class="kb-panel" aria-label="KB 가입제안서 + 공지사항">
      <div class="kb-box">
        <img id="kbImage" src="/docs/kb-signup.png" alt="KB 가입제안서" onerror="this.style.display='none'">
      </div>
      <div id="publicNotice" class="notice">공지사항: 여기에 내용을 표시합니다.</div>
    </section>

    <section class="pdf-panel" aria-label="월간 프라임 PDF (23~31p 반복)">
      <div class="pdf-wrap" aria-label="회사 소개 PDF 슬라이드">
        <canvas id="companyPdfCanvasBg" aria-hidden="true"></canvas>
        <canvas id="companyPdfCanvas"></canvas>
        <div id="pdfFallback" class="pdf-fallback">월간 프라임 PDF를 불러올 수 없습니다.</div>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    // 공지사항: 여기 텍스트만 바꾸면 끝
    const PUBLIC_NOTICE_TEXT = '공지사항: 월간 프라임/업무 안내를 확인해 주세요.';

    const noticeEl = document.getElementById('publicNotice');
    if (noticeEl) noticeEl.textContent = PUBLIC_NOTICE_TEXT;

    (function setupCompanyPdfSlideshow() {
      const canvas = document.getElementById('companyPdfCanvas');
      const bgCanvas = document.getElementById('companyPdfCanvasBg');
      const fallback = document.getElementById('pdfFallback');
      if (!canvas || !bgCanvas || !window['pdfjsLib']) return;

      const url = '/docs/company-intro.pdf';
      const startPage = 23;
      const endPage = 31;
      const displayMs = 5 * 60 * 1000; // 페이지당 5분

      let pdfDoc = null;
      let currentPage = startPage;
      let endPageSafe = endPage;
      let isRendering = false;

      const ctx = canvas.getContext('2d');
      const bgCtx = bgCanvas.getContext('2d');

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      function showFallback() {
        if (fallback) fallback.style.display = 'flex';
      }

      function renderPage(num) {
        if (!pdfDoc) return;
        isRendering = true;

        pdfDoc.getPage(num).then(function (page) {
          const container = canvas.parentElement;
          const containerWidth = container.clientWidth || 400;
          const containerHeight = container.clientHeight || 300;
          const viewport = page.getViewport({ scale: 1 });
          const scaleX = containerWidth / viewport.width;
          const scaleY = containerHeight / viewport.height;

          const FIT_ZOOM = 1.08;
          const scaleContain = Math.min(scaleX, scaleY) * FIT_ZOOM;
          const scaleCover = Math.max(scaleX, scaleY);

          const fgViewport = page.getViewport({ scale: scaleContain });
          const fgDpr = Math.max(1, Math.min(6, window.devicePixelRatio || 1));
          canvas.width = Math.floor(fgViewport.width * fgDpr);
          canvas.height = Math.floor(fgViewport.height * fgDpr);
          canvas.style.width = `${Math.floor(fgViewport.width)}px`;
          canvas.style.height = `${Math.floor(fgViewport.height)}px`;
          ctx.setTransform(fgDpr, 0, 0, fgDpr, 0, 0);

          try {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
          } catch {}

          const bgViewport = page.getViewport({ scale: scaleCover });
          const bgDpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
          bgCanvas.width = Math.floor(bgViewport.width * bgDpr);
          bgCanvas.height = Math.floor(bgViewport.height * bgDpr);
          bgCanvas.style.width = `${Math.floor(bgViewport.width)}px`;
          bgCanvas.style.height = `${Math.floor(bgViewport.height)}px`;
          bgCtx.setTransform(bgDpr, 0, 0, bgDpr, 0, 0);

          try {
            bgCtx.imageSmoothingEnabled = true;
            bgCtx.imageSmoothingQuality = 'high';
          } catch {}

          const fgTask = page.render({ canvasContext: ctx, viewport: fgViewport });
          const bgTask = page.render({ canvasContext: bgCtx, viewport: bgViewport });

          Promise.all([fgTask.promise, bgTask.promise]).then(function () {
            isRendering = false;
          }).catch(function () {
            isRendering = false;
            showFallback();
          });
        }).catch(function () {
          isRendering = false;
          showFallback();
        });
      }

      pdfjsLib.getDocument(url).promise
        .then(function (doc) {
          pdfDoc = doc;
          endPageSafe = Math.min(endPage, pdfDoc.numPages);
          currentPage = Math.min(Math.max(startPage, 1), endPageSafe);
          if (fallback) fallback.style.display = 'none';

          renderPage(currentPage);
          setInterval(function () {
            if (isRendering || !pdfDoc) return;
            currentPage = currentPage >= endPageSafe ? startPage : currentPage + 1;
            renderPage(currentPage);
          }, displayMs);
        })
        .catch(function () {
          showFallback();
        });
    })();
  </script>
</body>
</html>
