<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV 대시보드 - 공용</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #e9eff2;
      color: #0f172a;
      /* 전체화면(F11)·TV: 동적 뷰포트 기준 */
      min-height: 100dvh;
      height: 100dvh;
    }

    .public-layout {
      /* 첫 페인트: 대략 메인 높이 → JS가 실측 px로 덮어씀 */
      --public-main-h: calc(100dvh - 5.5rem);
      min-height: 100dvh;
      height: 100dvh;
      width: 100%;
      display: flex;
      flex-direction: column;
      position: relative;
      gap: 0;
    }

    /* 제안서 + PDF: 남는 세로 공간 전부 (공지는 내용 높이만) */
    .public-main {
      flex: 1 1 auto;
      min-height: 0;
      display: grid;
      /* 왼쪽: 세로 행 높이 대비 A4 세로(297)에 맞는 최소 가로(210) — 제안서가 A4보다 작아지지 않음 */
      grid-template-columns:
        max(220px, calc(var(--public-main-h) * 210 / 297))
        minmax(0, 1fr);
      gap: 0;
    }

    .kb-panel {
      padding: 0;
      background: #f7fafc;
      border-right: 0; /* 공지 구간까지 내려오는 세로선 제거 */
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .kb-box {
      /* TV에서도 양쪽 여백이 덜 남도록: 박스 높이를 패널에 맞춤 */
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 0;
      overflow: hidden;
      background: #ffffff;
      border: 0;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-right: 2px solid rgba(15, 23, 42, 0.12); /* PDF 끝라인까지만 세로선 표시 */
    }

    /* 왼쪽 제안서 하단 구분선: 남색 + 라운드 끝 */
    .kb-box::after {
      content: '';
      position: absolute;
      left: 0.35vw;
      right: 0.35vw;
      bottom: 0;
      height: 3px;
      background: #1e3a8a;
      border-radius: 999px;
      pointer-events: none;
    }

    .kb-box img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 잘림 없음 — 추가 scale 없음 */
      object-position: top center;
      display: block;
      background: transparent;
      max-height: 100%;
    }

    .notice {
      /* 하단: 내용 높이만 차지 → 위쪽 메인이 세로로 확장 */
      flex: 0 0 auto;
      flex-shrink: 0;
      min-height: 0;
      border-radius: 10px;
      background: #f3f1f8; /* 불투명으로 분할선 비침 제거 */
      border: 2px solid rgba(30, 58, 138, 0.28);
      box-shadow: 0 6px 14px rgba(15,23,42,0.07);
      padding: 0.28rem 0.5rem 0.32rem;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      color: #111827;
      font-size: clamp(1.42rem, 2.65dvh, 2.08rem);
      line-height: 1.22;
      flex-direction: column;
      overflow: hidden;
    }
    .public-layout > .notice {
      align-self: stretch;
      margin: 0 0.35vw 0.35dvh;
      z-index: 3;
    }

    .notice-text {
      width: 100%;
      text-align: center;
      line-height: 1.22;
    }

    .notice-top {
      color: #1e3a8a;
      font-weight: 1000;
      font-size: clamp(1.52rem, 2.85dvh, 2.28rem);
      line-height: 1.12;
    }

    .notice-yn {
      color: #ef4444;
      font-weight: 1000;
    }

    .notice-strong {
      color: #ef4444;
      font-weight: 1000;
      font-size: clamp(1.48rem, 3.12vh, 2.12rem);
    }

    .notice-sub {
      color: #111827;
      font-weight: 900;
      font-size: clamp(1.28rem, 2.55vh, 1.72rem);
    }

    .pdf-panel {
      padding: 0;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(110% 120% at 10% 10%, rgba(168, 85, 247, 0.30), transparent 50%),
        radial-gradient(90% 100% at 90% 20%, rgba(236, 72, 153, 0.16), transparent 55%),
        linear-gradient(160deg, #0b0720 0%, #1a0b45 40%, #2b0a57 72%, #160633 100%);
      color: #e9e7ff;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .pdf-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      border-radius: 0;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 0;
      box-shadow: none;
      display: block;
    }

    /* 배경: cover 크롭 후 블러(비율 유지, 영역은 꽉 참) */
    .pdf-wrap #companyPdfCanvasBg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      object-position: center;
      background: transparent;
      filter: none;
      opacity: 1;
      pointer-events: none;
      z-index: 0;
    }

    /* 전경: 출력 캔버스가 박스와 동일 비율(cover 크롭) → 여백 없이 표시 */
    .pdf-wrap #companyPdfCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      object-fit: fill;
      object-position: center;
      background: #000;
      z-index: 1;
    }

    .pdf-wrap .pdf-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.2vh 1.1vw;
      color: rgba(233,231,255,0.92);
      font-weight: 800;
      font-size: clamp(1rem, 2vh, 1.35rem);
      background: linear-gradient(180deg, rgba(15,23,42,0.55) 0%, rgba(15,23,42,0.25) 100%);
      backdrop-filter: blur(6px);
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="public-layout">
    <div class="public-main">
      <section class="kb-panel" aria-label="가입 제안서">
        <div class="kb-box">
          <img id="kbImage" src="/docs/kb-signup.png" alt="가입 제안서" onerror="this.style.display='none'">
        </div>
      </section>

      <section class="pdf-panel" aria-label="월간 프라임 PDF (전체 페이지 반복)">
        <div class="pdf-wrap" aria-label="월간 프라임 PDF 슬라이드">
          <canvas id="companyPdfCanvasBg" aria-hidden="true"></canvas>
          <canvas id="companyPdfCanvas"></canvas>
          <div id="pdfFallback" class="pdf-fallback">월간 프라임 PDF를 불러올 수 없습니다.</div>
        </div>
      </section>
    </div>
    <div id="publicNotice" class="notice">
      <div class="notice-text">
        <div class="notice-top">4월부터 전체보험사 모니터링이 변경되었습니다</div>
        <div>질문 복잡해지고 <span class="notice-yn">예/아니오</span> 섞여서 나오니</div>
        <div>끝까지 확인 한 후 답변해주세요!!</div>
        <div class="notice-strong">청약 후 3시간 후에만 해피콜 진행가능</div>
        <div class="notice-sub">(3시간 전에는 해피콜 진행이 불가능합니다)</div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const noticeEl = document.getElementById('publicNotice');
    const defaultPublicNoticeHtml = noticeEl ? noticeEl.innerHTML : '';

    (function loadTvProposalFromServer() {
      var kbImg = document.getElementById('kbImage');
      if (!kbImg) return;
      fetch('/api/tv-public/meta', { cache: 'no-store' })
        .then(function (r) {
          return r.json();
        })
        .then(function (meta) {
          if (meta && meta.proposal && meta.proposalUrl) {
            kbImg.src = meta.proposalUrl;
          } else {
            kbImg.src = '/docs/kb-signup.png';
          }
        })
        .catch(function () {});
      kbImg.addEventListener('load', function () {
        window.dispatchEvent(new Event('resize'));
      });
    })();

    (function setupCompanyPdfSlideshow() {
      const canvas = document.getElementById('companyPdfCanvas');
      const bgCanvas = document.getElementById('companyPdfCanvasBg');
      const fallback = document.getElementById('pdfFallback');
      const notice = document.getElementById('publicNotice');
      const layoutRoot = document.querySelector('.public-layout');
      const mainEl = document.querySelector('.public-main');
      if (!canvas || !bgCanvas || !window['pdfjsLib']) return;

      const defaultPdfUrl = '/docs/monthly-prime-april-shared.pdf';
      const displayMs = 5 * 60 * 1000; // 페이지당 5분

      let pdfDoc = null;
      let currentPage = 1;
      let endPageSafe = 1;
      let isRendering = false;

      const ctx = canvas.getContext('2d');
      const bgCtx = bgCanvas.getContext('2d');
      var pdfRenderOffscreen = null;

      function getPdfOffscreenCanvas() {
        if (!pdfRenderOffscreen) {
          pdfRenderOffscreen = document.createElement('canvas');
        }
        return pdfRenderOffscreen;
      }

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      function showFallback() {
        if (fallback) fallback.style.display = 'flex';
      }

      let lastPdfWrapW = 0;
      let lastPdfWrapH = 0;

      function updatePublicMainMetrics() {
        if (!mainEl || !layoutRoot) return;
        var h = Math.max(0, Math.floor(mainEl.getBoundingClientRect().height));
        layoutRoot.style.setProperty('--public-main-h', h + 'px');
      }

      /** 메인 행 높이·공지 높이 변화 후 PDF 뷰 크기가 바뀌면 한 번 더 렌더 */
      function syncMainAndMaybeRerenderPdf() {
        updatePublicMainMetrics();
        var wrap = canvas.parentElement;
        if (!wrap || !pdfDoc) return;
        if (isRendering) return;
        var w = wrap.clientWidth;
        var h = wrap.clientHeight;
        if (w !== lastPdfWrapW || h !== lastPdfWrapH) {
          lastPdfWrapW = w;
          lastPdfWrapH = h;
          renderPage(currentPage);
        }
      }

      function scheduleSyncPdf() {
        requestAnimationFrame(function () {
          syncMainAndMaybeRerenderPdf();
        });
      }

      if (mainEl && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(function () {
          scheduleSyncPdf();
        }).observe(mainEl);
      }
      if (notice && typeof ResizeObserver !== 'undefined') {
        new ResizeObserver(function () {
          scheduleSyncPdf();
        }).observe(notice);
      }

      async function loadPublicNotice() {
        if (!noticeEl) return;
        try {
          const res = await fetch('/api/notices');
          const data = await res.json();
          const html = String(data?.publicNoticeHtml || '').trim();
          noticeEl.innerHTML = html || defaultPublicNoticeHtml;
        } catch (_) {
          noticeEl.innerHTML = defaultPublicNoticeHtml;
        }
        requestAnimationFrame(function () {
          requestAnimationFrame(scheduleSyncPdf);
        });
      }

      function renderPage(num) {
        if (!pdfDoc) return;
        isRendering = true;

        pdfDoc.getPage(num).then(function (page) {
          const container = canvas.parentElement;
          const containerWidth = container.clientWidth || 400;
          const containerHeight = container.clientHeight || 300;
          const pageRotate = page.rotate || 0;
          const probe = page.getViewport({ scale: 1, rotation: pageRotate });
          const panelLandscape = containerWidth >= containerHeight * 0.98;
          const pageLooksPortrait = probe.width < probe.height - 1;
          let displayRotation = pageRotate;
          if (panelLandscape && pageLooksPortrait && pageRotate === 0) {
            displayRotation = 90;
          }

          const baseVp = page.getViewport({ scale: 1, rotation: displayRotation });
          const dpr = Math.max(1, Math.min(4, window.devicePixelRatio || 1));
          const scaleCover =
            Math.max(
              containerWidth / baseVp.width,
              containerHeight / baseVp.height
            ) || 1;
          const renderVp = page.getViewport({
            scale: scaleCover * dpr,
            rotation: displayRotation
          });

          const off = getPdfOffscreenCanvas();
          const ow = Math.max(1, Math.floor(renderVp.width));
          const oh = Math.max(1, Math.floor(renderVp.height));
          off.width = ow;
          off.height = oh;
          const octx = off.getContext('2d');
          octx.setTransform(1, 0, 0, 1, 0, 0);
          try {
            octx.imageSmoothingEnabled = true;
            octx.imageSmoothingQuality = 'high';
          } catch {}

          const outW = Math.max(1, Math.floor(containerWidth * dpr));
          const outH = Math.max(1, Math.floor(containerHeight * dpr));
          canvas.width = outW;
          canvas.height = outH;
          canvas.style.width = '100%';
          canvas.style.height = '100%';
          canvas.style.objectFit = 'fill';

          ctx.setTransform(1, 0, 0, 1, 0, 0);
          ctx.clearRect(0, 0, outW, outH);
          try {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
          } catch {}

          bgCanvas.width = outW;
          bgCanvas.height = outH;
          bgCanvas.style.width = '100%';
          bgCanvas.style.height = '100%';
          bgCanvas.style.objectFit = 'fill';
          bgCtx.setTransform(1, 0, 0, 1, 0, 0);
          bgCtx.clearRect(0, 0, outW, outH);

          function drawCoverCrop(targetCtx, sourceCanvas, dw, dh) {
            var swCanvas = sourceCanvas.width;
            var shCanvas = sourceCanvas.height;
            var destAspect = dw / dh;
            var srcAspect = swCanvas / shCanvas;
            var sx;
            var sy;
            var sw;
            var sh;
            if (srcAspect > destAspect) {
              sh = shCanvas;
              sw = Math.max(1, Math.floor(shCanvas * destAspect));
              sx = Math.floor((swCanvas - sw) / 2);
              sy = 0;
            } else {
              sw = swCanvas;
              sh = Math.max(1, Math.floor(swCanvas / destAspect));
              sx = 0;
              sy = Math.floor((shCanvas - sh) / 2);
            }
            targetCtx.drawImage(sourceCanvas, sx, sy, sw, sh, 0, 0, dw, dh);
          }

          page
            .render({ canvasContext: octx, viewport: renderVp })
            .promise.then(function () {
              drawCoverCrop(ctx, off, outW, outH);
              try {
                bgCtx.filter = 'blur(22px) saturate(1.12) contrast(1.06)';
                bgCtx.globalAlpha = 0.42;
                bgCtx.imageSmoothingEnabled = true;
                bgCtx.imageSmoothingQuality = 'high';
                drawCoverCrop(bgCtx, off, outW, outH);
              } catch (_) {
                bgCtx.globalAlpha = 0.42;
                drawCoverCrop(bgCtx, off, outW, outH);
              }
              bgCtx.filter = 'none';
              bgCtx.globalAlpha = 1;
              isRendering = false;
              scheduleSyncPdf();
            })
            .catch(function () {
              isRendering = false;
              showFallback();
            });
        }).catch(function () {
          isRendering = false;
          showFallback();
        });
      }

      function resolvePdfDocumentSource() {
        return fetch('/api/tv-public/meta', { cache: 'no-store' })
          .then(function (r) {
            return r.json();
          })
          .then(function (meta) {
            if (meta && meta.pdf && meta.pdfUrl) {
              var u = meta.pdfUrl;
              return fetch(u, { cache: 'no-store' }).then(function (res) {
                if (!res.ok) throw new Error('pdf');
                return res.arrayBuffer();
              }).then(function (ab) {
                return { data: new Uint8Array(ab) };
              });
            }
            return { url: defaultPdfUrl };
          })
          .catch(function () {
            return { url: defaultPdfUrl };
          });
      }

      resolvePdfDocumentSource()
        .then(function (src) {
          return pdfjsLib.getDocument(src).promise;
        })
        .then(function (doc) {
          pdfDoc = doc;
          endPageSafe = pdfDoc.numPages;
          if (endPageSafe < 1) {
            showFallback();
            return;
          }
          currentPage = 1;
          if (fallback) fallback.style.display = 'none';

          renderPage(currentPage);
          setInterval(function () {
            if (isRendering || !pdfDoc) return;
            currentPage = currentPage >= endPageSafe ? 1 : currentPage + 1;
            renderPage(currentPage);
          }, displayMs);

          setInterval(function () {
            loadPublicNotice().catch(function () {});
          }, 10000);

          window.addEventListener('resize', function () {
            lastPdfWrapW = 0;
            lastPdfWrapH = 0;
            scheduleSyncPdf();
          });
        })
        .catch(function () {
          showFallback();
        });

      loadPublicNotice().catch(function () {});
    })();
  </script>
</body>
</html>
