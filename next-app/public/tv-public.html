<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TV 대시보드 - 공용</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #e9eff2;
      color: #0f172a;
      height: 100vh;
    }

    .public-layout {
      height: 100vh;
      display: grid;
      grid-template-columns: 33% 67%;
      position: relative;
      gap: 0;
    }

    .kb-panel {
      padding: 0;
      background: #f7fafc;
      border-right: 0; /* 공지 구간까지 내려오는 세로선 제거 */
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .kb-box {
      /* TV에서도 양쪽 여백이 덜 남도록: 박스 높이를 패널에 맞춤 */
      flex: 1 1 auto;
      min-height: 0;
      border-radius: 0;
      overflow: hidden;
      background: #ffffff;
      border: 0;
      box-shadow: none;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      border-right: 2px solid rgba(15, 23, 42, 0.12); /* PDF 끝라인까지만 세로선 표시 */
    }

    /* 왼쪽 제안서 하단 구분선: 남색 + 라운드 끝 */
    .kb-box::after {
      content: '';
      position: absolute;
      left: 0.35vw;
      right: 0.35vw;
      bottom: 0;
      height: 3px;
      background: #1e3a8a;
      border-radius: 999px;
      pointer-events: none;
    }

    .kb-box img {
      width: 100%;
      height: 100%;
      object-fit: contain; /* 잘림 방지: 이미지 전체 표시 */
      object-position: top center;
      transform: scale(1.10); /* 한 단계 추가 확대 */
      transform-origin: top center;
      display: block;
      background: transparent;
      max-height: 100%;
    }

    .notice {
      /* 공용: PDF 하단선부터 시작하는 전체 공지 */
      flex: 0 0 auto;
      min-height: 0;
      border-radius: 12px;
      background: #f3f1f8; /* 불투명으로 분할선 비침 제거 */
      border: 2px solid rgba(30, 58, 138, 0.28);
      box-shadow: 0 8px 18px rgba(15,23,42,0.08);
      padding: 0.45vh 0.55vw;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-weight: 900;
      color: #111827;
      font-size: clamp(1.9rem, 3.8vh, 2.6rem); /* 원래 큰 글씨로 복구 */
      line-height: 1.35;
      flex-direction: column;
      overflow: hidden;
    }
    .public-layout > .notice {
      position: absolute;
      left: 0.35vw;
      right: 0.35vw;
      bottom: 0;
      z-index: 3;
    }

    .notice-text {
      width: 100%;
      text-align: center;
      line-height: 1.35;
    }

    .notice-top {
      color: #1e3a8a;
      font-weight: 1000;
      font-size: clamp(2.04rem, 4.1vh, 2.9rem);
      line-height: 1.18;
    }

    .notice-yn {
      color: #ef4444;
      font-weight: 1000;
    }

    .notice-strong {
      color: #ef4444;
      font-weight: 1000;
      font-size: clamp(2.0rem, 3.9vh, 2.76rem);
    }

    .notice-sub {
      color: #111827;
      font-weight: 900;
      font-size: clamp(1.64rem, 3.1vh, 2.04rem);
    }

    .pdf-panel {
      /* PDF 체감 크기는 유지하고 주변 여백만 더 압축 */
      padding: 0.35vh 0.35vw 0.35vh;
      min-height: 0;
      overflow: hidden;
      background:
        radial-gradient(110% 120% at 10% 10%, rgba(168, 85, 247, 0.30), transparent 50%),
        radial-gradient(90% 100% at 90% 20%, rgba(236, 72, 153, 0.16), transparent 55%),
        linear-gradient(160deg, #0b0720 0%, #1a0b45 40%, #2b0a57 72%, #160633 100%);
      color: #e9e7ff;
      display: flex;
      flex-direction: column;
      gap: 0;
    }

    .pdf-wrap {
      position: relative;
      flex: 1;
      min-height: 0;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 8px 20px rgba(0,0,0,0.18);
      display: flex;
      /* 캔버스가 세로로 가운데 떠서 위/아래 여백이 생기므로, 위로 붙임 */
      align-items: flex-start;
      justify-content: center;
    }

    .pdf-wrap canvas {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: transparent;
    }

    .pdf-wrap #companyPdfCanvasBg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      background: transparent;
      filter: blur(18px) saturate(1.15) contrast(1.05);
      opacity: 0.35;
      transform: scale(1.06);
      transform-origin: center;
      pointer-events: none;
      z-index: 0;
    }

    .pdf-wrap #companyPdfCanvas {
      position: relative;
      z-index: 1;
      background: #fff;
    }

    .pdf-wrap .pdf-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.2vh 1.1vw;
      color: rgba(233,231,255,0.92);
      font-weight: 800;
      font-size: clamp(1rem, 2vh, 1.35rem);
      background: linear-gradient(180deg, rgba(15,23,42,0.55) 0%, rgba(15,23,42,0.25) 100%);
      backdrop-filter: blur(6px);
      z-index: 2;
    }
  </style>
</head>

<body>
  <div class="public-layout">
    <section class="kb-panel" aria-label="KB 가입제안서 + 공지사항">
      <div class="kb-box">
        <img id="kbImage" src="/docs/kb-signup.png" alt="KB 가입제안서" onerror="this.style.display='none'">
      </div>
    </section>

    <section class="pdf-panel" aria-label="월간 프라임 PDF (23~31p 반복)">
      <div class="pdf-wrap" aria-label="회사 소개 PDF 슬라이드">
        <canvas id="companyPdfCanvasBg" aria-hidden="true"></canvas>
        <canvas id="companyPdfCanvas"></canvas>
        <div id="pdfFallback" class="pdf-fallback">월간 프라임 PDF를 불러올 수 없습니다.</div>
      </div>
    </section>
    <div id="publicNotice" class="notice">
      <div class="notice-text">
        <div class="notice-top">4월부터 전체보험사 모니터링이 변경되었습니다</div>
        <div>질문 복잡해지고 <span class="notice-yn">예/아니오</span> 섞여서 나오니</div>
        <div>끝까지 확인 한 후 답변해주세요!!</div>
        <div class="notice-strong">청약 후 3시간 후에만 해피콜 진행가능</div>
        <div class="notice-sub">(3시간 전에는 해피콜 진행이 불가능합니다)</div>
      </div>
    </div>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const noticeEl = document.getElementById('publicNotice');
    const defaultPublicNoticeHtml = noticeEl ? noticeEl.innerHTML : '';

    (function setupCompanyPdfSlideshow() {
      const canvas = document.getElementById('companyPdfCanvas');
      const bgCanvas = document.getElementById('companyPdfCanvasBg');
      const fallback = document.getElementById('pdfFallback');
      const notice = document.getElementById('publicNotice');
      if (!canvas || !bgCanvas || !window['pdfjsLib']) return;

      const url = '/docs/company-intro.pdf';
      const startPage = 23;
      const endPage = 31;
      const displayMs = 5 * 60 * 1000; // 페이지당 5분

      let pdfDoc = null;
      let currentPage = startPage;
      let endPageSafe = endPage;
      let isRendering = false;

      const ctx = canvas.getContext('2d');
      const bgCtx = bgCanvas.getContext('2d');

      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      function showFallback() {
        if (fallback) fallback.style.display = 'flex';
      }

      function syncNoticeUnderPdf() {
        if (!notice) return;
        const layout = document.querySelector('.public-layout');
        const kbPanel = document.querySelector('.kb-panel');
        if (!layout) return;
        const layoutRect = layout.getBoundingClientRect();
        const canvasRect = canvas.getBoundingClientRect();

        const minNoticeHeight = 76;
        const rawTop = Math.floor(canvasRect.bottom - layoutRect.top);
        const maxTop = Math.floor(layoutRect.height - minNoticeHeight);
        const top = Math.max(0, Math.min(rawTop, maxTop));
        const height = Math.max(minNoticeHeight, Math.floor(layoutRect.height - top));

        notice.style.top = `${top}px`;
        notice.style.height = `${height}px`;

        // 왼쪽 제안서 하단선을 PDF 하단선과 동일하게 맞춤
        if (kbPanel) {
          kbPanel.style.height = `${top}px`;
          kbPanel.style.minHeight = `${top}px`;
          kbPanel.style.maxHeight = `${top}px`;
        }
      }

      async function loadPublicNotice() {
        if (!noticeEl) return;
        try {
          const res = await fetch('/api/notices');
          const data = await res.json();
          const html = String(data?.publicNoticeHtml || '').trim();
          noticeEl.innerHTML = html || defaultPublicNoticeHtml;
        } catch (_) {
          noticeEl.innerHTML = defaultPublicNoticeHtml;
        }
      }

      function renderPage(num) {
        if (!pdfDoc) return;
        isRendering = true;

        pdfDoc.getPage(num).then(function (page) {
          const container = canvas.parentElement;
          const containerWidth = container.clientWidth || 400;
          const containerHeight = container.clientHeight || 300;
          const viewport = page.getViewport({ scale: 1 });
          const scaleX = containerWidth / viewport.width;
          const scaleY = containerHeight / viewport.height;

          const FIT_ZOOM = 1.08;
          const scaleContain = Math.min(scaleX, scaleY) * FIT_ZOOM;
          const scaleCover = Math.max(scaleX, scaleY);

          // 잘림 없이 크게: contain 기반으로 렌더
          const fgViewport = page.getViewport({ scale: scaleContain });
          const fgDpr = Math.max(1, Math.min(6, window.devicePixelRatio || 1));
          canvas.width = Math.floor(fgViewport.width * fgDpr);
          canvas.height = Math.floor(fgViewport.height * fgDpr);
          canvas.style.width = `${Math.floor(fgViewport.width)}px`;
          canvas.style.height = `${Math.floor(fgViewport.height)}px`;
          ctx.setTransform(fgDpr, 0, 0, fgDpr, 0, 0);

          try {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
          } catch {}

          const bgViewport = page.getViewport({ scale: scaleCover });
          const bgDpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
          bgCanvas.width = Math.floor(bgViewport.width * bgDpr);
          bgCanvas.height = Math.floor(bgViewport.height * bgDpr);
          bgCanvas.style.width = `${Math.floor(bgViewport.width)}px`;
          bgCanvas.style.height = `${Math.floor(bgViewport.height)}px`;
          bgCtx.setTransform(bgDpr, 0, 0, bgDpr, 0, 0);

          try {
            bgCtx.imageSmoothingEnabled = true;
            bgCtx.imageSmoothingQuality = 'high';
          } catch {}

          const fgTask = page.render({ canvasContext: ctx, viewport: fgViewport });
          const bgTask = page.render({ canvasContext: bgCtx, viewport: bgViewport });

          Promise.all([fgTask.promise, bgTask.promise]).then(function () {
            isRendering = false;
            syncNoticeUnderPdf();
          }).catch(function () {
            isRendering = false;
            showFallback();
          });
        }).catch(function () {
          isRendering = false;
          showFallback();
        });
      }

      pdfjsLib.getDocument(url).promise
        .then(function (doc) {
          pdfDoc = doc;
          endPageSafe = Math.min(endPage, pdfDoc.numPages);
          currentPage = Math.min(Math.max(startPage, 1), endPageSafe);
          if (fallback) fallback.style.display = 'none';

          renderPage(currentPage);
          setInterval(function () {
            if (isRendering || !pdfDoc) return;
            currentPage = currentPage >= endPageSafe ? startPage : currentPage + 1;
            renderPage(currentPage);
          }, displayMs);

          setInterval(function () {
            loadPublicNotice().catch(function () {});
          }, 10000);

          window.addEventListener('resize', function () {
            syncNoticeUnderPdf();
          });
        })
        .catch(function () {
          showFallback();
        });

      loadPublicNotice().catch(function () {});
    })();
  </script>
</body>
</html>
