<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>매니저 출석 - TV 대시보드</title>
  <style>
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
      background: #e9eff2;
      color: #0f172a;
      height: 100vh;
      overflow: hidden;
    }

    /* 전체: 상단(오늘출근 + 육하) + 하단(매니저 카드 그리드) */
    .layout {
      height: 100vh;
      display: grid;
      grid-template-rows: 60vh 40vh; /* 하단(카드) 영역을 조금 더 확보 */
      gap: 0;
      /* TV 오버스캔(하단 잘림) 대비 안전 여백 */
      padding: 0.8vh 0.8vw 6.0vh;
    }

    .top {
      display: grid;
      /* 오른쪽(PDF) 영역을 더 크게 */
      grid-template-columns: 40% 60%;
      gap: 0;
      min-height: 0;
    }

    .panel {
      min-height: 0;
      overflow: hidden;
    }

    /* 좌측: 오늘 출근 */
    .present-panel {
      /* 배경은 원래처럼 밝게 + 바깥만 은은한 형광 포인트 */
      background: #f7fafc;
      border-right: 2px solid rgba(15, 23, 42, 0.12);
      border: 10px solid rgba(255, 59, 212, 0.9);
      box-shadow:
        0 0 0 3px rgba(8, 255, 214, 0.38),
        0 0 18px rgba(255, 59, 212, 0.35);
      padding: 1.6vh 1.4vw 1.0vh;
      display: flex;
      flex-direction: column;
      gap: 0.9vh;
      align-items: center;
    }
    .present-title {
      font-size: clamp(2.6rem, 5.8vh, 4.6rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      background: linear-gradient(90deg, #7c3aed 0%, #ec4899 45%, #06b6d4 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      margin: 0;
      line-height: 1.05;
      text-shadow: 0 10px 24px rgba(124, 58, 237, 0.25);
      text-align: center;
    }
    .present-title::after {
      content: '';
      display: block;
      width: min(78%, 520px);
      height: 6px;
      margin: 0.9vh auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, rgba(124,58,237,0.0) 0%, rgba(236,72,153,0.55) 35%, rgba(6,182,212,0.55) 65%, rgba(124,58,237,0.0) 100%);
      filter: blur(0.2px);
      opacity: 0.9;
    }
    .present-empty {
      margin: 0.6vh 0 0;
      color: #64748b;
      font-size: clamp(1.05rem, 1.9vh, 1.35rem);
      font-weight: 600;
      text-align: center;
    }
    .present-list {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      gap: 0.9vh;
      padding-top: 0.2vh;
      width: 100%;
      align-items: center;
    }
    .present-list.two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-content: start;
      align-items: stretch;
      justify-items: center;
      gap: 0.9vh 1.0vw;
      padding-top: 0.2vh;
    }
    .present-row {
      display: grid;
      grid-template-columns: 36% 64%;
      align-items: center;
      gap: 1.2vw;
      padding: 0.9vh 1.0vw;
      border-radius: 10px;
      background: #ffffff;
      border: 1px solid rgba(15,23,42,0.10);
      box-shadow: 0 6px 18px rgba(15,23,42,0.06);
      width: min(96%, 860px);
      position: relative;
      overflow: hidden;
    }
    .present-row:nth-child(odd) {
      background: #fbfdff;
    }
    .present-row::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(120% 140% at 20% 0%, rgba(124,58,237,0.10), transparent 55%),
                  radial-gradient(120% 140% at 90% 20%, rgba(6,182,212,0.08), transparent 55%);
      pointer-events: none;
      opacity: 0.9;
    }
    .present-row > * { position: relative; z-index: 1; }
    .present-list.two-col .present-row {
      width: min(98%, 420px);
      grid-template-columns: 34% 66%;
    }
    .present-row .logo {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      min-width: 0;
    }
    .present-row .logo img {
      height: clamp(40px, 5.6vh, 66px);
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }
    .present-row .meta {
      min-width: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) max-content;
      grid-template-rows: auto auto;
      gap: 0.3vh 1.1vw;
      align-items: baseline;
      padding-right: 0.6vw;
    }
    .present-row .company {
      grid-column: 1 / -1;
      font-size: clamp(1.2rem, 2.4vh, 1.8rem);
      font-weight: 900;
      line-height: 1.1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .present-row .name {
      font-size: clamp(1.1rem, 2.2vh, 1.65rem);
      font-weight: 900;
      color: #1e293b;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.6),
        0 6px 14px rgba(15,23,42,0.10);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .present-row .phone {
      font-size: clamp(1.25rem, 2.7vh, 1.85rem);
      font-weight: 900;
      color: #0f172a;
      text-shadow:
        0 1px 0 rgba(255,255,255,0.75),
        0 10px 20px rgba(6,182,212,0.12),
        0 14px 26px rgba(15,23,42,0.10);
      white-space: nowrap;
      justify-self: end;
    }
    .present-list.two-col .present-row .meta {
      padding-right: 0.4vw;
      gap: 0.25vh 0.8vw;
    }
    .present-list.two-col .present-row .phone {
      font-size: clamp(1.1rem, 2.35vh, 1.6rem);
      letter-spacing: -0.01em;
    }

    /* 우측: 육하 보드 */
    .yookha-panel {
      background: radial-gradient(110% 120% at 10% 10%, rgba(168, 85, 247, 0.35), transparent 50%),
                  radial-gradient(90% 100% at 90% 20%, rgba(236, 72, 153, 0.22), transparent 55%),
                  linear-gradient(160deg, #0b0720 0%, #1a0b45 40%, #2b0a57 72%, #160633 100%);
      color: #e9e7ff;
      /* 패널 바깥쪽 여백을 줄여 PDF가 더 꽉 차 보이게 */
      padding: 0.6vh 0.6vw;
      display: flex;
      flex-direction: column;
      min-height: 0;
    }

    .yookha-left {
      position: relative;
      flex: 1;
      min-height: 0;
      /* PDF를 오른쪽 패널에 '꽉 차게' 보여주기 위해 내부 여백 제거 */
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.03) 100%);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: inset 0 0 0 1px rgba(15,23,42,0.25), 0 18px 40px rgba(0,0,0,0.25);
      overflow: hidden;
      padding: 0;
    }
    .pdf-wrap {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      overflow: hidden;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
      box-shadow: 0 14px 34px rgba(0,0,0,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pdf-wrap canvas {
      width: auto;
      height: auto;
      max-width: 100%;
      max-height: 100%;
      display: block;
      background: #fff;
    }
    .pdf-wrap #companyPdfCanvasBg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      max-width: none;
      max-height: none;
      background: transparent;
      filter: blur(18px) saturate(1.15) contrast(1.05);
      opacity: 0.35;
      transform: scale(1.06);
      transform-origin: center;
      pointer-events: none;
    }
    .pdf-wrap #companyPdfCanvas {
      position: relative;
      z-index: 1;
    }
    .pdf-wrap .pdf-fallback {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.2vh 1.1vw;
      color: rgba(233,231,255,0.92);
      font-weight: 800;
      font-size: clamp(1rem, 2vh, 1.35rem);
      background: linear-gradient(180deg, rgba(15,23,42,0.55) 0%, rgba(15,23,42,0.25) 100%);
      backdrop-filter: blur(6px);
    }
    .yookha-logo {
      font-size: clamp(2.8rem, 6.2vh, 4.6rem);
      font-weight: 1000;
      letter-spacing: -0.05em;
      margin: 0 0 0.6vh;
      text-shadow: 0 8px 18px rgba(0,0,0,0.35);
    }
    .yookha-sub {
      font-size: clamp(1.05rem, 2.1vh, 1.4rem);
      color: rgba(233,231,255,0.85);
      font-weight: 700;
      margin: 0;
      line-height: 1.4;
    }
    .tilt-card {
      position: absolute;
      width: min(240px, 22vw);
      height: min(320px, 26vh);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255,255,255,0.14) 0%, rgba(255,255,255,0.06) 100%);
      border: 1px solid rgba(255,255,255,0.16);
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding: 1.2vh 1.1vw;
      font-weight: 900;
      color: rgba(233,231,255,0.95);
      text-align: center;
      line-height: 1.2;
    }
    .tilt-card.small {
      width: min(190px, 18vw);
      height: min(250px, 20vh);
    }
    .tilt-card.one {
      right: 14%;
      top: 34%;
      transform: rotate(12deg);
      border-color: rgba(99,102,241,0.35);
    }
    .tilt-card.two {
      right: 32%;
      top: 44%;
      transform: rotate(-10deg);
      border-color: rgba(236,72,153,0.35);
    }
    .tilt-card .badge {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.18);
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      margin-bottom: 0.8vh;
    }
    .tilt-card .card-title {
      font-size: clamp(1.1rem, 2.3vh, 1.55rem);
      margin: 0 0 0.4vh;
    }
    .tilt-card .card-sub {
      font-size: clamp(0.9rem, 1.7vh, 1.1rem);
      margin: 0;
      opacity: 0.9;
    }

    /* (요청 반영) PDF를 한 곳에서 크게 보여주기 위해 육하 보드 우측(1~5) 박스는 제거 */

    /* 하단: 전체 매니저 카드 */
    .bottom {
      background: #f8fafc;
      border-top: 2px solid rgba(15, 23, 42, 0.14);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
      min-height: 0;
    }
    .bottom-col {
      min-height: 0;
      overflow: hidden;
      padding: 0.6vh 0.9vw 0.55vh;
      display: flex;
      flex-direction: column;
      gap: 0;
    }
    .bottom-col.left { border-right: 2px solid rgba(15,23,42,0.12); }
    .cards {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr)); /* 스샷처럼 촘촘하게 */
      gap: 0.55vh 0.7vw;
      align-content: start;
    }
    .card {
      background: #ffffff;
      border: 1px solid rgba(15,23,42,0.10);
      border-radius: 14px;
      box-shadow: 0 10px 22px rgba(15,23,42,0.06);
      padding: 0.45vh 0.55vw;
      display: grid;
      grid-template-rows: auto auto auto;
      gap: 0.25vh;
      min-width: 0;
    }
    .card .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 2.8vh;
    }
    .card .logo img {
      height: clamp(20px, 3.4vh, 30px);
      width: auto;
      max-width: 100%;
      object-fit: contain;
      display: block;
    }
    .card .line1 {
      text-align: center;
      font-size: clamp(0.9rem, 1.5vh, 1.08rem);
      font-weight: 1000;
      line-height: 1.12;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #0b1220;
    }
    .card .line2 {
      text-align: center;
      font-size: clamp(0.84rem, 1.4vh, 1.02rem);
      font-weight: 900;
      color: #0b1220;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* (보정) 생명보험(오른쪽 컬럼) 카드만 아주 미세하게 축소 */
    .bottom > .bottom-col:last-child .cards { gap: 0.5vh 0.65vw; }
    .bottom > .bottom-col:last-child .card { padding: 0.42vh 0.52vw; border-radius: 13px; }
    .bottom > .bottom-col:last-child .card .logo { min-height: 2.6vh; }
    .bottom > .bottom-col:last-child .card .logo img { height: clamp(18px, 3.1vh, 28px); }
    .bottom > .bottom-col:last-child .card .line1 { font-size: clamp(0.88rem, 1.42vh, 1.03rem); }
    .bottom > .bottom-col:last-child .card .line2 { font-size: clamp(0.82rem, 1.33vh, 0.98rem); }
    .empty {
      color: #64748b;
      font-weight: 700;
      font-size: clamp(1rem, 1.8vh, 1.25rem);
      margin: 0;
      padding: 0.8vh 0.3vw;
    }
  </style>
</head>
<body>
  <div class="layout">
    <div class="top">
      <section class="panel present-panel" aria-label="오늘 출근한 매니저">
        <h1 class="present-title">오늘 출근한 매니저님</h1>
        <p id="presentEmpty" class="present-empty" style="display:none;">출근한 매니저가 없습니다.</p>
        <div id="presentList" class="present-list"></div>
      </section>

      <section class="panel yookha-panel" aria-label="회사 소개 PDF">
        <div class="yookha-left">
          <div class="pdf-wrap" aria-label="회사 소개 PDF 슬라이드">
            <canvas id="companyPdfCanvasBg" aria-hidden="true"></canvas>
            <canvas id="companyPdfCanvas"></canvas>
            <div id="pdfFallback" class="pdf-fallback">회사 소개 PDF를 불러올 수 없습니다.</div>
          </div>
        </div>
      </section>
    </div>

    <div class="bottom" aria-label="전체 매니저">
      <section class="bottom-col left">
        <div id="damageCards" class="cards"></div>
      </section>
      <section class="bottom-col">
        <div id="lifeCards" class="cards"></div>
      </section>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script>
    const presentListEl = document.getElementById('presentList');
    const presentEmptyEl = document.getElementById('presentEmpty');
    const damageCardsEl = document.getElementById('damageCards');
    const lifeCardsEl = document.getElementById('lifeCards');

    // 오늘 출근한 매니저: 5명까지 1컬럼, 6~10명은 2컬럼(항상 한눈에)
    const PRESENT_PAGE_SIZE = 5;
    const PRESENT_TWO_COL_MAX = 10;
    let presentCache = [];

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s ?? '';
      return div.innerHTML;
    }

    function managerCardHtml(m) {
      const logoUrl = m.logo ? '/logos/' + encodeURIComponent(m.logo) : '';
      const logoHtml = logoUrl
        ? `<div class="logo"><img src="${logoUrl}" alt="" onerror="this.parentElement.innerHTML=''"></div>`
        : `<div class="logo"></div>`;

      const nameText = escapeHtml(m.name) + (m.suffix ? ' ' + escapeHtml(m.suffix) : '');
      const line1 = `${nameText}`;
      const line2 = `${escapeHtml(m.phone)}`;

      return `<div class="card">
        ${logoHtml}
        <div class="line1">${line1}</div>
        <div class="line2">${line2}</div>
      </div>`;
    }

    function presentRowHtml(r) {
      const logoUrl = r.logo ? '/logos/' + encodeURIComponent(r.logo) : '';
      const logoHtml = logoUrl
        ? `<div class="logo"><img src="${logoUrl}" alt="" onerror="this.parentElement.innerHTML=''"></div>`
        : `<div class="logo"></div>`;

      const companyColor = r.color ? escapeHtml(r.color) : '';
      const companyStyleAttr = companyColor ? ` style="color:${companyColor}"` : '';
      const companyText = `<span${companyStyleAttr}>${escapeHtml(r.company)}</span>`;
      const nameText = escapeHtml(r.name) + (r.suffix ? ' ' + escapeHtml(r.suffix) : '');

      return `<div class="present-row">
        ${logoHtml}
        <div class="meta">
          <div class="company">${companyText}</div>
          <div class="name">${nameText}</div>
          <div class="phone">${escapeHtml(r.phone)}</div>
        </div>
      </div>`;
    }

    function renderPresentPage() {
      const present = presentCache || [];
      if (!present.length) {
        presentListEl.innerHTML = '';
        presentEmptyEl.style.display = 'block';
        presentListEl.classList.remove('two-col');
        return;
      }

      presentEmptyEl.style.display = 'none';

      if (present.length <= PRESENT_PAGE_SIZE) {
        presentListEl.classList.remove('two-col');
        presentListEl.innerHTML = present.map((r) => presentRowHtml(r)).join('');
        return;
      }

      // 6~10명: 2컬럼으로 전체를 항상 보여줌
      if (present.length <= PRESENT_TWO_COL_MAX) {
        presentListEl.classList.add('two-col');
        presentListEl.innerHTML = present.map((r) => presentRowHtml(r)).join('');
        return;
      }

      // 10명을 초과하는 극단 케이스: 2컬럼으로 10명까지만 표시 (나머지는 숨김)
      presentListEl.classList.add('two-col');
      presentListEl.innerHTML = present.slice(0, PRESENT_TWO_COL_MAX).map((r) => presentRowHtml(r)).join('');
    }

    async function loadManagers() {
      try {
        const list = await fetch('/api/managers').then((r) => r.json());
        const damage = (list || []).filter((m) => m.category === '손해보험' && String(m.id) !== '9');
        const life = (list || []).filter((m) => m.category === '생명보험');

        damageCardsEl.innerHTML = damage.length ? damage.map((m) => managerCardHtml(m)).join('') : '<p class="empty">-</p>';
        lifeCardsEl.innerHTML = life.length ? life.map((m) => managerCardHtml(m)).join('') : '<p class="empty">-</p>';
      } catch {
        damageCardsEl.innerHTML = '<p class="empty">목록을 불러올 수 없습니다.</p>';
        lifeCardsEl.innerHTML = '<p class="empty">목록을 불러올 수 없습니다.</p>';
      }
    }

    async function loadPresent() {
      try {
        const records = await fetch('/api/attendance/today').then((r) => r.json());
        presentCache = (records || []).filter((r) => !r.checkoutAt);
        renderPresentPage();
      } catch {
        presentListEl.innerHTML = '<p class="empty">출근 목록을 불러올 수 없습니다.</p>';
        presentEmptyEl.style.display = 'none';
      }
    }

    function refresh() {
      loadManagers();
      loadPresent();
    }

    refresh();
    setInterval(refresh, 5000);

    /* 회사 소개 PDF 자동 슬라이드 (페이지당 10초) */
    (function setupCompanyPdfSlideshow() {
      const canvas = document.getElementById('companyPdfCanvas');
      const bgCanvas = document.getElementById('companyPdfCanvasBg');
      const fallback = document.getElementById('pdfFallback');
      if (!canvas || !window['pdfjsLib']) return;

      const url = '/docs/company-intro.pdf';
      const displaySeconds = 10;
      let pdfDoc = null;
      let currentPage = 1;
      let isRendering = false;

      const ctx = canvas.getContext('2d');
      const bgCtx = bgCanvas ? bgCanvas.getContext('2d') : null;
      pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

      function showFallback() {
        if (fallback) fallback.style.display = 'flex';
      }

      function renderPage(num) {
        if (!pdfDoc) return;
        isRendering = true;
        pdfDoc.getPage(num).then(function (page) {
          const container = canvas.parentElement;
          const containerWidth = container.clientWidth || 400;
          const containerHeight = container.clientHeight || 300;
          const viewport = page.getViewport({ scale: 1 });
          const scaleX = containerWidth / viewport.width;
          const scaleY = containerHeight / viewport.height;
          // 여백(레터박스)이 아까우면 contain에 약간의 줌을 더해 더 꽉 차게 만든다.
          // 값이 커질수록 여백은 줄지만, 가장자리가 조금 잘릴 수 있다.
          const FIT_ZOOM = 1.08;
          const scaleContain = Math.min(scaleX, scaleY) * FIT_ZOOM;
          const scaleCover = Math.max(scaleX, scaleY); // 배경 채움(여백 제거용)

          // 전경(원본 전체): DPR을 더 올려 선명도 강화
          // TV에서 작은 글씨가 흐릿하면 여기 상한을 올리면 개선된다(대신 렌더 비용 증가).
          const fgViewport = page.getViewport({ scale: scaleContain });
          const fgDpr = Math.max(1, Math.min(6, window.devicePixelRatio || 1));
          canvas.width = Math.floor(fgViewport.width * fgDpr);
          canvas.height = Math.floor(fgViewport.height * fgDpr);
          canvas.style.width = `${Math.floor(fgViewport.width)}px`;
          canvas.style.height = `${Math.floor(fgViewport.height)}px`;
          ctx.setTransform(fgDpr, 0, 0, fgDpr, 0, 0);
          // 축소 표시 시 품질 개선(브라우저 지원 범위 내)
          try {
            ctx.imageSmoothingEnabled = true;
            ctx.imageSmoothingQuality = 'high';
          } catch {}

          // 배경(cover + blur): 여백을 자연스럽게 채우기. 배경은 DPR 낮춰도 충분.
          if (bgCanvas && bgCtx) {
            const bgViewport = page.getViewport({ scale: scaleCover });
            const bgDpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
            bgCanvas.width = Math.floor(bgViewport.width * bgDpr);
            bgCanvas.height = Math.floor(bgViewport.height * bgDpr);
            bgCanvas.style.width = `${Math.floor(bgViewport.width)}px`;
            bgCanvas.style.height = `${Math.floor(bgViewport.height)}px`;
            bgCtx.setTransform(bgDpr, 0, 0, bgDpr, 0, 0);
            try {
              bgCtx.imageSmoothingEnabled = true;
              bgCtx.imageSmoothingQuality = 'high';
            } catch {}
          }

          const renderContext = {
            canvasContext: ctx,
            viewport: fgViewport,
          };
          const fgTask = page.render(renderContext);

          let bgTask = null;
          if (bgCanvas && bgCtx) {
            const bgViewport = page.getViewport({ scale: scaleCover });
            bgTask = page.render({ canvasContext: bgCtx, viewport: bgViewport });
          }

          Promise.all([fgTask.promise, bgTask ? bgTask.promise : Promise.resolve()])
            .then(function () {
              isRendering = false;
            })
            .catch(function () {
              isRendering = false;
              showFallback();
            });
        }).catch(function () {
          isRendering = false;
          showFallback();
        });
      }

      pdfjsLib.getDocument(url).promise
        .then(function (doc) {
          pdfDoc = doc;
          if (fallback) fallback.style.display = 'none';
          renderPage(currentPage);
          setInterval(function () {
            if (isRendering || !pdfDoc) return;
            currentPage = currentPage % pdfDoc.numPages + 1;
            renderPage(currentPage);
          }, displaySeconds * 1000);
        })
        .catch(function () {
          showFallback();
        });
    })();
  </script>
</body>
</html>
